<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhichWayNigeria - ADC 2027 Election Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); position: fixed; width: 100%; top: 0; z-index: 1000; padding: 1rem 0; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.5rem; color: #22c55e; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #22c55e; }
        main { padding-top: 80px; }
        .hero { padding: 4rem 0; text-align: center; background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, transparent 50%); }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.25rem; color: #94a3b8; max-width: 600px; margin: 0 auto 2rem; }
        .cta-button { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: white; padding: 1rem 2rem; border-radius: 12px; text-decoration: none; font-weight: 600; transition: transform 0.3s, box-shadow 0.3s; border: none; cursor: pointer; }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3); }
        .dashboard { padding: 3rem 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-4px); border-color: rgba(34, 197, 94, 0.3); }
        .stat-label { color: #94a3b8; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #22c55e; }
        .stat-change { font-size: 0.875rem; color: #22c55e; margin-top: 0.25rem; }
        .section { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .calculator { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .calculator { grid-template-columns: 1fr; } .hero h1 { font-size: 2rem; } .nav-links { display: none; } }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem 1rem; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #22c55e; }
        .results-panel { background: rgba(15, 23, 42, 0.8); border-radius: 12px; padding: 1.5rem; }
        .result-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .result-item:last-child { border-bottom: none; }
        .chart-container { height: 400px; width: 100%; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
        .news-card { background: rgba(15, 23, 42, 0.6); border-radius: 12px; padding: 1.5rem; border-left: 4px solid #22c55e; }
        .news-source { font-size: 0.75rem; color: #22c55e; text-transform: uppercase; font-weight: 600; margin-bottom: 0.5rem; }
        .news-title { font-weight: 600; margin-bottom: 0.5rem; line-height: 1.4; }
        .news-meta { font-size: 0.875rem; color: #64748b; }
        .sentiment-positive { color: #22c55e; }
        .sentiment-neutral { color: #eab308; }
        .sentiment-negative { color: #ef4444; }
        .ai-status { display: inline-flex; align-items: center; gap: 8px; background: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.875rem; font-weight: 500; }
        .pulse { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .states-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .state-card { background: rgba(15, 23, 42, 0.6); border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .state-card:hover { background: rgba(34, 197, 94, 0.1); transform: scale(1.05); }
        .state-name { font-weight: 600; margin-bottom: 0.5rem; }
        .state-stats { font-size: 0.875rem; color: #94a3b8; }
        .recommendations { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 12px; padding: 1.5rem; margin-top: 1rem; }
        .recommendations h4 { color: #22c55e; margin-bottom: 1rem; }
        .recommendations ul { list-style: none; }
        .recommendations li { padding: 0.5rem 0; padding-left: 1.5rem; position: relative; }
        .recommendations li::before { content: "→"; position: absolute; left: 0; color: #22c55e; }
        footer { background: rgba(15, 23, 42, 0.95); border-top: 1px solid rgba(255,255,255,0.1); padding: 2rem 0; margin-top: 4rem; text-align: center; color: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area } = Recharts;
        const nigeriaStates = ["Abia", "Adamawa", "Akwa Ibom", "Anambra", "Bauchi", "Bayelsa", "Benue", "Borno", "Cross River", "Delta", "Ebonyi", "Edo", "Ekiti", "Enugu", "Gombe", "Imo", "Jigawa", "Kaduna", "Kano", "Katsina", "Kebbi", "Kogi", "Kwara", "Lagos", "Nasarawa", "Niger", "Ogun", "Ondo", "Osun", "Oyo", "Plateau", "Rivers", "Sokoto", "Taraba", "Yobe", "Zamfara", "FCT"];
        const generatePollingData = () => {
            const months = ['Jan 2025', 'Feb 2025', 'Mar 2025', 'Apr 2025', 'May 2025', 'Jun 2025', 'Jul 2025', 'Aug 2025', 'Sep 2025', 'Oct 2025', 'Nov 2025', 'Dec 2025', 'Jan 2026', 'Feb 2026', 'Mar 2026'];
            return months.map((month, index) => ({ month, ADC: 28 + (index * 2.5) + (Math.random() * 5 - 2.5), APC: 35 - (index * 0.5) + (Math.random() * 4 - 2), PDP: 22 - (index * 0.3) + (Math.random() * 3 - 1.5), Others: 15 - (index * 1.7) + (Math.random() * 2 - 1) }));
        };
        const App = () => {
            const [pollingData, setPollingData] = useState(generatePollingData());
            const [aiStatus, setAiStatus] = useState('Analyzing...');
            const [lastUpdate, setLastUpdate] = useState(new Date());
            const [calculatorData, setCalculatorData] = useState({ state: '', population: '', target: '60', current: '' });
            const [calculationResult, setCalculationResult] = useState(null);
            const analyzeWithAI = async () => {
                setAiStatus('Analyzing with AI...');
                try {
                    const response = await fetch('/api/analyze', { method: 'POST' });
                    if (response.ok) {
                        const result = await response.json();
                        if (result.data && result.data.national) {
                            setPollingData(prev => {
                                const newData = [...prev];
                                const lastPoint = newData[newData.length - 1];
                                lastPoint.ADC = result.data.national.adc || lastPoint.ADC;
                                lastPoint.APC = result.data.national.apc || lastPoint.APC;
                                lastPoint.PDP = result.data.national.pdp || lastPoint.PDP;
                                return newData;
                            });
                        }
                    }
                } catch (error) { console.log('AI analysis error, using simulation'); }
                setAiStatus('Analysis Complete');
                setLastUpdate(new Date());
                setTimeout(() => setAiStatus('Monitoring...'), 3000);
            };
            useEffect(() => { analyzeWithAI(); const interval = setInterval(analyzeWithAI, 24 * 60 * 60 * 1000); return () => clearInterval(interval); }, []);
            const handleCalculatorSubmit = (e) => {
                e.preventDefault();
                const pop = parseInt(calculatorData.population) || 0;
                const target = parseInt(calculatorData.target) || 60;
                const current = parseInt(calculatorData.current) || 0;
                const targetVoters = Math.round(pop * (target / 100));
                const gap = targetVoters - current;
                const percentage = ((current / pop) * 100).toFixed(1);
                let recommendations = [];
                if (gap > 10000) recommendations = ['Launch intensive door-to-door campaign', 'Partner with local community leaders', 'Organize weekly town hall meetings', 'Deploy mobile registration units'];
                else if (gap > 5000) recommendations = ['Increase social media engagement', 'Host community empowerment events', 'Activate youth mobilization teams'];
                else recommendations = ['Focus on voter retention strategies', 'Implement get-out-the-vote operations', 'Strengthen existing member engagement'];
                setCalculationResult({ targetVoters, gap, percentage, recommendations, performance: percentage >= target ? 'Excellent' : percentage >= target * 0.7 ? 'Good' : 'Needs Improvement' });
            };
            const newsItems = [
                { source: 'Premium Times', title: 'ADC Coalition Gains Momentum Across Northern States', sentiment: 'positive', time: '2 hours ago' },
                { source: 'The Guardian Nigeria', title: '2027 Election: ADC Presents Alternative Vision for Nigeria', sentiment: 'positive', time: '4 hours ago' },
                { source: 'Vanguard News', title: 'Opposition Parties Unite Under ADC Banner', sentiment: 'positive', time: '6 hours ago' },
                { source: 'Channels TV', title: 'ADC Criticizes Government Economic Policies', sentiment: 'neutral', time: '8 hours ago' }
            ];
            return (
                <div>
                    <header>
                        <div className="container header-content">
                            <div className="logo">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                WhichWayNigeria
                            </div>
                            <nav>
                                <ul className="nav-links">
                                    <li><a href="#dashboard">Dashboard</a></li>
                                    <li><a href="#calculator">Calculator</a></li>
                                    <li><a href="#polling">Polling</a></li>
                                    <li><a href="#news">News</a></li>
                                    <li><a href="#states">States</a></li>
                                </ul>
                            </nav>
                            <div className="ai-status"><div className="pulse"></div>{aiStatus}</div>
                        </div>
                    </header>
                    <main>
                        <section className="hero">
                            <div className="container">
                                <h1>Building a New Nigeria Together with ADC</h1>
                                <p>Join the movement for change. Track voter registration, view AI-powered real-time polling data, and be part of the coalition reshaping Nigeria's future.</p>
                                <a href="https://adcregistration.ng/registration/membership" target="_blank" className="cta-button">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
                                    Register with ADC Officially
                                </a>
                                <p style={{marginTop: '1rem', fontSize: '0.875rem', color: '#64748b'}}>Last AI Analysis: {lastUpdate.toLocaleTimeString()}</p>
                            </div>
                        </section>
                        <section id="dashboard" className="dashboard">
                            <div className="container">
                                <div className="stats-grid">
                                    <div className="stat-card"><div className="stat-label">Total Registered Voters</div><div className="stat-value">98.4M</div><div className="stat-change">+2.7M new registrations</div></div>
                                    <div className="stat-card"><div className="stat-label">ADC Members</div><div className="stat-value">12.6M</div><div className="stat-change">+15% this quarter</div></div>
                                    <div className="stat-card"><div className="stat-label">ADC National Polling</div><div className="stat-value">42%</div><div className="stat-change">+4.2% momentum</div></div>
                                    <div className="stat-card"><div className="stat-label">Youth Voters (18-35)</div><div className="stat-value">45.3M</div><div className="stat-change">ADC leads with 42%</div></div>
                                </div>
                                <div id="calculator" className="section">
                                    <h2 className="section-title">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
                                        LGA Registration Rate Calculator
                                    </h2>
                                    <div className="calculator">
                                        <form onSubmit={handleCalculatorSubmit}>
                                            <div className="form-group">
                                                <label>Select State</label>
                                                <select value={calculatorData.state} onChange={(e) => setCalculatorData({...calculatorData, state: e.target.value})} required>
                                                    <option value="">Choose a state</option>
                                                    {nigeriaStates.map(state => (<option key={state} value={state}>{state}</option>))}
                                                </select>
                                            </div>
                                            <div className="form-group">
                                                <label>LGA Population (Eligible Voters)</label>
                                                <input type="number" placeholder="e.g., 50000" value={calculatorData.population} onChange={(e) => setCalculatorData({...calculatorData, population: e.target.value})} required />
                                            </div>
                                            <div className="form-group">
                                                <label>Target Registration (%)</label>
                                                <input type="number" value={calculatorData.target} onChange={(e) => setCalculatorData({...calculatorData, target: e.target.value})} min="1" max="100" />
                                            </div>
                                            <div className="form-group">
                                                <label>Current ADC Members</label>
                                                <input type="number" placeholder="e.g., 15000" value={calculatorData.current} onChange={(e) => setCalculatorData({...calculatorData, current: e.target.value})} required />
                                            </div>
                                            <button type="submit" className="cta-button">Calculate Performance</button>
                                        </form>
                                        {calculationResult && (
                                            <div className="results-panel">
                                                <h3 style={{marginBottom: '1rem', color: '#22c55e'}}>Performance Analysis</h3>
                                                <div className="result-item"><span>Current Registration Rate</span><strong>{calculationResult.percentage}%</strong></div>
                                                <div className="result-item"><span>Target Voters</span><strong>{calculationResult.targetVoters.toLocaleString()}</strong></div>
                                                <div className="result-item"><span>Gap to Target</span><strong style={{color: calculationResult.gap > 0 ? '#ef4444' : '#22c55e'}}>{calculationResult.gap > 0 ? `-${calculationResult.gap.toLocaleString()}` : 'Target Met!'}</strong></div>
                                                <div className="result-item"><span>Performance Rating</span><strong style={{color: calculationResult.performance === 'Excellent' ? '#22c55e' : calculationResult.performance === 'Good' ? '#eab308' : '#ef4444'}}>{calculationResult.performance}</strong></div>
                                                <div className="recommendations"><h4>AI-Generated Recommendations</h4><ul>{calculationResult.recommendations.map((rec, idx) => (<li key={idx}>{rec}</li>))}</ul></div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div id="polling" className="section">
                                    <h2 className="section-title">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                                        AI-Powered Polling Trends
                                    </h2>
